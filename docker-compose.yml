version: "3.8"

services:
  taskfloww_front:
    image: node:22-alpine
    container_name: taskfloww_front
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3010:3000"
    volumes:
      - ./frontend:/app
    networks:
      - taskfloww_net
    restart: unless-stopped
    environment:
      TASKFLOWW_API_INTERNAL_URL: ${TASKFLOWW_API_INTERNAL_URL:-http://taskfloww_api:8000}
      TASKFLOWW_AUTH_ALLOWED_ORIGINS: ${TASKFLOWW_AUTH_ALLOWED_ORIGINS:-http://localhost:3010}
      TASKFLOWW_SESSION_MAX_AGE_SECONDS: ${TASKFLOWW_SESSION_MAX_AGE_SECONDS:-1800}
      AUTH_DEFAULT_EMPRESA_CODIGO: ${AUTH_DEFAULT_EMPRESA_CODIGO:?AUTH_DEFAULT_EMPRESA_CODIGO must be configured}

  taskfloww_api:
    image: python:3.12-slim
    container_name: taskfloww_api
    working_dir: /app
    # Development compose installs dev requirements for pytest/Alembic checks.
    # Future production compose should install only requirements.txt and avoid --reload.
    command: >
      sh -c "
      pip install -r requirements.txt -r requirements-dev.txt &&
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "
    ports:
      - "8010:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - taskfloww_db
      - taskfloww_redis
    networks:
      - taskfloww_net
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be configured}
      REDIS_URL: ${REDIS_URL:?REDIS_URL must be configured}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:?AUTH_SECRET_KEY must be configured}
      AUTH_ALGORITHM: ${AUTH_ALGORITHM:-HS256}
      AUTH_ACCESS_TOKEN_EXPIRE_MINUTES: ${AUTH_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      AUTH_MAX_FAILED_ATTEMPTS: ${AUTH_MAX_FAILED_ATTEMPTS:-5}
      AUTH_LOCKOUT_MINUTES: ${AUTH_LOCKOUT_MINUTES:-15}

  taskfloww_db:
    image: postgres:16-alpine
    container_name: taskfloww_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: taskfloww
      POSTGRES_USER: taskfloww
      POSTGRES_PASSWORD: taskfloww_senha_segura
    volumes:
      - ./db_data:/var/lib/postgresql/data
    networks:
      - taskfloww_net

  taskfloww_redis:
    image: redis:7-alpine
    container_name: taskfloww_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./redis:/data
    networks:
      - taskfloww_net

networks:
  taskfloww_net:
    driver: bridge
