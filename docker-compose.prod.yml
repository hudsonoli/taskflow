services:
  taskfloww_front:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskfloww_front_prod
    restart: unless-stopped
    depends_on:
      - taskfloww_api
    networks:
      - taskfloww_net
      - proxy

  taskfloww_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskfloww_api_prod
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://taskfloww:taskfloww_senha_segura@taskfloww_db:5432/taskfloww
      REDIS_URL: redis://taskfloww_redis:6379/0
    depends_on:
      - taskfloww_db
      - taskfloww_redis
    networks:
      - taskfloww_net
      - proxy

  taskfloww_db:
    image: postgres:16-alpine
    container_name: taskfloww_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: taskfloww
      POSTGRES_USER: taskfloww
      POSTGRES_PASSWORD: taskfloww_senha_segura
    volumes:
      - ./db_data:/var/lib/postgresql/data
    networks:
      - taskfloww_net

  taskfloww_redis:
    image: redis:7-alpine
    container_name: taskfloww_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./redis:/data
    networks:
      - taskfloww_net

networks:
  taskfloww_net:
    driver: bridge

  proxy:
    external: true
